services:
  tech-monitoring:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tech-monitoring
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    env_file:
      - .env
    environment:
      - UPTIME_SECRET_KEY=change-this-in-production-limon
      - DB_FILE=/app/data/uptime.db
      - LOG_FILE=/app/data/tech.log
    volumes:
      - ./:/app
    working_dir: /app
    user: "0:0"
    command: sh -c "mkdir -p /app/data && touch /app/data/uptime.db /app/data/tech.log && chmod 666 /app/data/uptime.db /app/data/tech.log && exec gunicorn --bind 0.0.0.0:8080 --workers 1 --threads 4 --timeout 60 --reload app:app"
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    networks:
      - tech-monitoring-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/auth/status', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "1.50"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  tech-monitoring-net:
    name: tech-monitoring-net
    driver: bridge
