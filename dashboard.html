<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptime Monitor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0b0b0e;
  --surface:  #111116;
  --surface2: #16161d;
  --border:   #1f1f2e;
  --text:     #d8d8e8;
  --muted:    #52526a;
  --green:    #22c55e;
  --red:      #ef4444;
  --amber:    #f59e0b;
  --blue:     #4f9cf9;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo svg { width: 20px; height: 20px; }
.logo h1 { font-size: 0.95rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #fff; }
.header-right { display: flex; align-items: center; gap: 1rem; }
#db-info { font-size: 0.68rem; color: var(--muted); }
#refresh-badge {
  font-size: 0.65rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 8px;
  color: var(--muted);
}

/* ── Summary bar ─────────────────────────────────────── */
#summary-bar {
  display: flex;
  gap: 2rem;
  padding: 0.8rem 2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  font-size: 0.72rem;
}
.sum-item { display: flex; align-items: center; gap: 6px; color: var(--muted); }
.sum-val  { color: var(--text); font-weight: 700; }
.sum-dot  { width: 7px; height: 7px; border-radius: 50%; }
.sum-dot.up   { background: var(--green); }
.sum-dot.down { background: var(--red); }

/* ── Main layout ─────────────────────────────────────── */
main { padding: 1.5rem 2rem; max-width: 1400px; }

/* ── Service card ────────────────────────────────────── */
.service-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 1.2rem;
  overflow: hidden;
  transition: border-color 0.2s;
}
.service-card:hover { border-color: #2a2a3e; }
.service-card.is-down { border-left: 3px solid var(--red); }
.service-card.is-up   { border-left: 3px solid var(--green); }

/* Card header */
.card-head {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1.2rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.card-head:hover { background: var(--surface2); }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0;
  transition: all 0.3s;
}
.status-dot.up   { background: var(--green); box-shadow: 0 0 8px var(--green)88; }
.status-dot.down { background: var(--red);   box-shadow: 0 0 8px var(--red)88; }
.status-dot.unknown { background: var(--muted); }

.svc-name { font-size: 0.88rem; font-weight: 700; color: #fff; flex: 1; }
.svc-url  { font-size: 0.68rem; color: var(--muted); flex: 2; }
.svc-interval { font-size: 0.65rem; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.chevron { color: var(--muted); font-size: 0.7rem; transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

/* Metrics row */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
}
@media (max-width: 900px) {
  .metrics-row { grid-template-columns: repeat(4, 1fr); }
}
.metric-cell {
  padding: 0.8rem 1rem;
  border-right: 1px solid var(--border);
}
.metric-cell:last-child { border-right: none; }
.metric-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 2px; }
.metric-sub   { font-size: 0.58rem; color: #333; margin-bottom: 5px; }
.metric-val   { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.metric-val.good { color: var(--green); }
.metric-val.warn { color: var(--amber); }
.metric-val.bad  { color: var(--red); }
.metric-val.link { text-decoration: underline; cursor: default; }

/* Expandable chart */
.card-body { display: none; padding: 1rem 1.2rem; }
.card-body.open { display: block; }
.chart-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 0.6rem; }
canvas { width: 100% !important; display: block; }

/* ── Skeleton loader ─────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  height: 14px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="9" stroke="#4f9cf9" stroke-width="1.5"/>
      <path d="M10 5v5l3 3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h1>Uptime Monitor</h1>
  </div>
  <div class="header-right">
    <span id="db-info">Loading…</span>
    <span id="refresh-badge">⟳ 30s</span>
  </div>
</header>

<div id="summary-bar">
  <div class="sum-item"><div class="sum-dot up"></div> <span>Up: <span class="sum-val" id="s-up">–</span></span></div>
  <div class="sum-item"><div class="sum-dot down"></div> <span>Down: <span class="sum-val" id="s-down">–</span></span></div>
  <div class="sum-item">Services: <span class="sum-val" id="s-total">–</span></div>
  <div class="sum-item">Last updated: <span class="sum-val" id="s-time">–</span></div>
</div>

<main id="main">
  <div class="skeleton" style="height:80px;margin-bottom:1rem"></div>
  <div class="skeleton" style="height:80px;margin-bottom:1rem"></div>
  <div class="skeleton" style="height:80px"></div>
</main>

<script>
const API_SERVICES = "/api/services";
const API_DB       = "/api/db-stats";

function colorClass(val, good, warn) {
  if (val === null || val === undefined) return "";
  return val >= good ? "good" : val >= warn ? "warn" : "bad";
}
function daysClass(d) {
  if (d === null || d === undefined) return "";
  return d > 60 ? "good" : d > 14 ? "warn" : "bad";
}
function fmt(v, suffix="") {
  if (v === null || v === undefined) return "–";
  return v + suffix;
}

let openCards = new Set();

function renderCard(s) {
  const upClass  = s.current_up === null ? "unknown" : s.current_up ? "up" : "down";
  const cardCls  = s.current_up === null ? "" : s.current_up ? "is-up" : "is-down";
  const curMs    = s.current_ms ? Math.round(s.current_ms) + "ms" : "–";
  const avgMs    = s.avg_ms_24h ? s.avg_ms_24h.toFixed(1) + "ms" : "–";
  const sslDays  = s.ssl_days  !== null ? s.ssl_days  + " days" : "–";
  const domDays  = s.domain_days !== null ? s.domain_days + " days" : "–";
  const open     = openCards.has(s.id);

  return `
  <div class="service-card ${cardCls}" id="card-${s.id}">
    <div class="card-head" onclick="toggleCard(${s.id})">
      <div class="status-dot ${upClass}"></div>
      <div class="svc-name">${s.name}</div>
      <div class="svc-url">${s.url}</div>
      <div class="svc-interval">every ${s.interval}s</div>
      <div class="chevron ${open ? 'open' : ''}">▼</div>
    </div>

    <div class="metrics-row">
      ${metricCell("Response", "(Current)", curMs,
          s.current_ms > 800 ? "warn" : s.current_ms ? "good" : "", true)}
      ${metricCell("Avg. Response", "(24 hours)", avgMs,
          s.avg_ms_24h > 800 ? "warn" : s.avg_ms_24h ? "good" : "")}
      ${metricCell("Uptime", "(24 hours)", fmt(s.uptime_24h, "%"),
          colorClass(s.uptime_24h, 99.9, 95))}
      ${metricCell("Uptime", "(30 days)", fmt(s.uptime_30d, "%"),
          colorClass(s.uptime_30d, 99.9, 95))}
      ${metricCell("Uptime", "(1 year)", fmt(s.uptime_1y, "%"),
          colorClass(s.uptime_1y, 99.9, 95))}
      ${metricCell("Cert Exp.", s.ssl_expiry || "–", sslDays,
          daysClass(s.ssl_days), true)}
      ${metricCell("Domain Exp.", s.domain_expiry || "–", domDays,
          daysClass(s.domain_days))}
    </div>

    <div class="card-body ${open ? 'open' : ''}" id="body-${s.id}">
      <div class="chart-label">Response time — last 2 hours</div>
      <canvas id="chart-${s.id}" height="80"></canvas>
    </div>
  </div>`;
}

function metricCell(label, sub, val, cls, link=false) {
  return `
    <div class="metric-cell">
      <div class="metric-label">${label}</div>
      <div class="metric-sub">${sub}</div>
      <div class="metric-val ${cls} ${link ? 'link' : ''}">${val}</div>
    </div>`;
}

function toggleCard(id) {
  if (openCards.has(id)) { openCards.delete(id); }
  else { openCards.add(id); }
  const body = document.getElementById(`body-${id}`);
  const chev = document.querySelector(`#card-${id} .chevron`);
  if (body) body.classList.toggle("open", openCards.has(id));
  if (chev) chev.classList.toggle("open", openCards.has(id));
}

function drawChart(canvasId, history) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || !history.length) return;
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.parentElement.clientWidth;
  const H   = 80;
  canvas.width  = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const vals = history.map(h => h.ms);
  const max  = Math.max(...vals, 1);
  const n    = vals.length;
  if (n < 2) return;

  // Grid
  ctx.strokeStyle = "#1a1a2a"; ctx.lineWidth = 0.5;
  [0.33, 0.66].forEach(f => {
    const y = H - f * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  // Area
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = (i / (n-1)) * W;
    const y = H - (v / max) * (H - 6);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#4f9cf944"); g.addColorStop(1, "#4f9cf900");
  ctx.fillStyle = g; ctx.fill();

  // Line
  ctx.beginPath();
  vals.forEach((v, i) => {
    const x = (i / (n-1)) * W;
    const y = H - (v / max) * (H - 6);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = "#4f9cf9"; ctx.lineWidth = 1.5; ctx.stroke();

  // Down markers
  history.forEach((h, i) => {
    if (!h.ok) {
      ctx.fillStyle = "#ef444488";
      ctx.fillRect((i / (n-1)) * W - 1, 0, 2, H);
    }
  });

  // Max label
  ctx.fillStyle = "#555"; ctx.font = "9px monospace";
  ctx.fillText(Math.round(max) + "ms", 4, 10);
}

let lastData = [];

async function refresh() {
  try {
    const [svcs, dbStats] = await Promise.all([
      fetch(API_SERVICES).then(r => r.json()),
      fetch(API_DB).then(r => r.json()),
    ]);

    lastData = svcs;

    // Summary bar
    const up   = svcs.filter(s => s.current_up === true).length;
    const down = svcs.filter(s => s.current_up === false).length;
    document.getElementById("s-up").textContent    = up;
    document.getElementById("s-down").textContent  = down;
    document.getElementById("s-total").textContent = svcs.length;
    document.getElementById("s-time").textContent  = new Date().toLocaleTimeString();
    document.getElementById("db-info").textContent =
      `DB: ${dbStats.db_file}  ·  ${dbStats.total_checks.toLocaleString()} checks stored`;

    // Cards
    document.getElementById("main").innerHTML = svcs.map(renderCard).join("");

    // Draw charts for open cards
    svcs.forEach(s => {
      if (openCards.has(s.id)) drawChart(`chart-${s.id}`, s.history);
    });

  } catch(e) {
    document.getElementById("main").innerHTML =
      `<p style="color:var(--red);padding:2rem">Error: ${e.message} — is monitor.py running?</p>`;
  }
}

// Countdown badge
let countdown = 30;
setInterval(() => {
  countdown--;
  if (countdown <= 0) { countdown = 30; refresh(); }
  document.getElementById("refresh-badge").textContent = `⟳ ${countdown}s`;
}, 1000);

// Draw chart when card is opened
const _toggleCard = window.toggleCard;
window.toggleCard = function(id) {
  _toggleCard(id);
  if (openCards.has(id)) {
    const svc = lastData.find(s => s.id === id);
    if (svc) setTimeout(() => drawChart(`chart-${id}`, svc.history), 50);
  }
};

refresh();
</script>
</body>
</html>
