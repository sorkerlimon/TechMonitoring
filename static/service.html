<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Service Detail — Tech Monitoring</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0e;--surface:#111116;--s2:#16161d;--s3:#1c1c26;
  --border:#1f1f2e;--b2:#2a2a3e;
  --text:#d8d8e8;--muted:#52526a;--dim:#333340;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#4f9cf9;
  --green-glow:#22c55e55;--red-glow:#ef444455;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}

/* ─ Sidebar ─────────────────────────────────────────────── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:100;
}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:1.2rem 1.2rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-logo .icon{font-size:1.2rem}
.sidebar-logo h1{font-size:0.9rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff}
.sidebar-logo .version{font-size:0.6rem;color:var(--muted);margin-top:2px}
.back-link{display:flex;align-items:center;gap:6px;padding:0.8rem 1.2rem;font-size:0.75rem;color:var(--muted);border-bottom:1px solid var(--border)}
.back-link:hover{color:#fff;background:var(--s2)}
.sidebar-list{flex:1;overflow-y:auto;padding:0.5rem 0}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--border)}
.svc-item{display:flex;align-items:center;gap:10px;padding:0.65rem 1.2rem;cursor:pointer;border-left:3px solid transparent;transition:background 0.15s,border-color 0.15s}
.svc-item:hover{background:var(--s2)}
.svc-item.active{background:var(--s3);border-left-color:var(--blue)}
.svc-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--muted)}
.svc-item .dot.up{background:var(--green);box-shadow:0 0 6px var(--green-glow)}
.svc-item .dot.down{background:var(--red);box-shadow:0 0 6px var(--red-glow)}
.svc-item .svc-info{flex:1;min-width:0}
.svc-item .svc-name{font-size:0.8rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-item .svc-ms{font-size:0.65rem;color:var(--muted);margin-top:2px}
.sidebar-footer{padding:1rem 1.2rem;border-top:1px solid var(--border)}
.add-btn{width:100%;padding:0.6rem;background:var(--green);color:#000;font-size:0.78rem;font-weight:700;letter-spacing:1px;border:none;border-radius:8px;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{opacity:0.85}

/* ─ Main ─────────────────────────────────────────────────── */
.main{margin-left:260px;min-height:100vh}

/* ─ Page header ─────────────────────────────────────────── */
.page-header{padding:1.5rem 2rem;border-bottom:1px solid var(--border);background:var(--surface)}
.page-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem}
.svc-title{display:flex;align-items:center;gap:12px}
.svc-title h2{font-size:1.4rem;font-weight:700;color:#fff}
.svc-id{color:var(--muted);font-size:1rem}
.svc-link{display:block;color:var(--green);font-size:0.82rem;margin-top:4px}
.actions{display:flex;gap:8px}
.btn{display:flex;align-items:center;gap:5px;padding:0.5rem 1rem;border-radius:7px;font-size:0.78rem;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--text)}
.btn:hover{background:var(--s3)}
.btn.pause{color:var(--amber);border-color:var(--amber)44}
.btn.edit{color:var(--blue);border-color:var(--blue)44}
.btn.clone{color:var(--text)}
.btn.del{color:var(--red);border-color:var(--red)44}
.btn.del:hover{background:#ef444422}

/* ─ Heartbeat section ───────────────────────────────────── */
.hb-section{background:var(--surface);border-bottom:1px solid var(--border);padding:1.2rem 2rem}
.hb-row{display:flex;align-items:center;gap:3px;height:40px;margin-bottom:0.4rem}
.hb-bar{flex:1;height:34px;border-radius:3px;background:var(--s2);cursor:pointer;position:relative;transition:background-color 0.35s ease, opacity 0.35s ease}
.hb-bar:hover{opacity:0.75}
.hb-bar.up{background:var(--green)}
.hb-bar.down{background:var(--red)}
.hb-times{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--muted)}
.hb-footer{display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;font-size:0.7rem;color:var(--muted)}
.check-info{font-size:0.72rem;color:var(--muted)}
.up-badge{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;font-size:1rem;font-weight:800;margin-left:1rem}
.up-badge.up{background:var(--green);color:#000}
.up-badge.down{background:var(--red);color:#fff}
.up-badge.unknown{background:var(--muted);color:#fff}

/* ─ Stats ─────────────────────────────────────────────── */
.stats-row{
  display:grid;grid-template-columns:repeat(7,1fr);
  background:var(--surface);border-bottom:1px solid var(--border);
}
.stat-cell{padding:1.2rem 1rem;border-right:1px solid var(--border);text-align:center}
.stat-cell:last-child{border-right:none}
.stat-label{font-size:0.65rem;font-weight:700;color:#fff;margin-bottom:4px}
.stat-sub{font-size:0.58rem;color:var(--muted);margin-bottom:8px}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--text)}
.stat-val.good{color:var(--green)}
.stat-val.warn{color:var(--amber)}
.stat-val.bad{color:var(--red)}
.stat-val.link{color:var(--blue);text-decoration:underline;cursor:default}
.stat-val2{font-size:0.8rem;color:var(--muted);margin-top:4px}

/* ─ Chart section ───────────────────────────────────────── */
.chart-section{padding:1.5rem 2rem;background:var(--s2)}
.chart-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:1rem;flex-wrap:wrap}
.chart-title{font-size:0.72rem;text-transform:uppercase;letter-spacing:2px;color:#fff;font-weight:600}
.chart-tools{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.chart-tools label{font-size:0.68rem;color:#fff}
.chart-tools select{
  background:var(--surface);border:1px solid var(--b2);color:#fff;
  padding:0.35rem 0.55rem;border-radius:6px;font-size:0.72rem
}
.chart-legend{display:flex;align-items:center;gap:6px;font-size:0.7rem;color:#fff}
.legend-dot{width:12px;height:4px;background:var(--green);border-radius:2px}
canvas{display:block;width:100%!important;border-radius:6px}

/* ─ Recent checks table ─────────────────────────────────── */
.checks-section{padding:1.5rem 2rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-head h3{font-size:0.9rem;font-weight:700;color:#fff}
.checks-tools{display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap}
.checks-tools label{font-size:0.68rem;color:var(--muted)}
.checks-tools select{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:0.35rem 0.55rem;border-radius:6px;font-size:0.72rem
}
.pager{display:flex;align-items:center;gap:0.4rem}
.pager button{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:0.3rem 0.55rem;border-radius:6px;font-size:0.72rem
}
.pager button:disabled{opacity:0.5;cursor:not-allowed}
#checks-page-info{font-size:0.68rem;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:0.75rem}
th{text-align:left;padding:0.5rem 0.75rem;border-bottom:1px solid var(--border);color:var(--muted);font-size:0.62rem;text-transform:uppercase;letter-spacing:1px;font-weight:600}
td{padding:0.5rem 0.75rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:0.65rem;font-weight:700}
.badge.up{background:#22c55e22;color:var(--green)}
.badge.down{background:#ef444422;color:var(--red)}

/* ─ Modal ────────────────────────────────────────────────── */
.modal-overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:500;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;margin:0 1rem 2rem;overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1.05rem;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;padding:0 4px}
.modal-close:hover{color:#fff}
.modal-body{padding:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.modal-col{display:flex;flex-direction:column;gap:1rem}
.section-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:0.3rem;font-weight:600}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:0.75rem;color:var(--text);font-weight:500}
.form-hint{font-size:0.65rem;color:var(--muted)}
.notify-pick{display:flex;flex-direction:column;gap:.4rem;max-height:150px;overflow-y:auto;padding:.55rem;border:1px solid var(--border);border-radius:8px;background:var(--s2)}
.notify-pick label{display:flex;align-items:center;gap:.5rem;font-size:.82rem;cursor:pointer;color:var(--text)}
.notify-pick .empty-hint{font-size:.78rem;color:var(--muted);line-height:1.45}
.notify-pick a{color:var(--blue)}
.form-control{background:var(--s2);border:1px solid var(--border);color:var(--text);font-size:0.82rem;padding:0.55rem 0.8rem;border-radius:8px;outline:none;font-family:inherit;width:100%}
.form-control:focus{border-color:var(--blue)}
.form-control option{background:var(--s2)}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.75rem}
.btn-cancel{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:0.55rem 1.2rem;border-radius:8px;font-size:0.82rem}
.btn-save{background:var(--green);border:none;color:#000;padding:0.55rem 1.5rem;border-radius:8px;font-size:0.82rem;font-weight:700}
.error-msg{color:var(--red);font-size:0.72rem;padding:0.5rem 1.5rem;display:none}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <span class="icon">📡</span>
    <div><h1>Tech Monitoring</h1><div class="version" id="db-info">–</div></div>
  </div>
  <a class="back-link" href="/">← All Monitors</a>
  <div class="sidebar-list" id="sidebar-list"></div>
  <div class="sidebar-footer">
    <button class="add-btn" onclick="location.href='/'">＋ Add New Monitor</button>
  </div>
</aside>

<div class="main">
  <!-- Page header -->
  <div class="page-header">
    <div class="page-header-top">
      <div class="svc-title">
        <div>
          <h2 id="svc-name">Loading…</h2>
          <a id="svc-url" class="svc-link" href="#" target="_blank"></a>
        </div>
        <span id="svc-id" class="svc-id"></span>
      </div>
      <div class="actions">
        <button class="btn" onclick="location.href='/settings'">⚙ Settings</button>
        <button class="btn" onclick="logout()">↪ Logout</button>
        <button class="btn pause" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
        <button class="btn edit"  onclick="openEditModal()">✏ Edit</button>
        <button class="btn del"   onclick="deleteMonitor()">🗑 Delete</button>
      </div>
    </div>
  </div>

  <!-- Heartbeat section -->
  <div class="hb-section">
    <div style="display:flex;align-items:center">
      <div style="flex:1">
        <div class="hb-row" id="hb-row"></div>
        <div class="hb-times"><span id="hb-start">–</span><span>now</span></div>
        <div class="hb-footer">
          <span class="check-info" id="check-info">–</span>
        </div>
      </div>
      <div class="up-badge unknown" id="up-badge">?</div>
    </div>
  </div>

  <!-- Stats row -->
  <div class="stats-row" id="stats-row"></div>

  <!-- Chart -->
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Response Time (ms)</div>
      <div class="chart-tools">
        <label for="chart-range">Range</label>
        <select id="chart-range" onchange="onChartRangeChange()">
          <option value="5m">Last 5 minutes</option>
          <option value="1h">Last 1 hour</option>
          <option value="1d" selected>Last 24 hours</option>
          <option value="2d">Last 2 days</option>
          <option value="7d">Last 7 days</option>
          <option value="15d">Last 15 days</option>
        </select>
        <div class="chart-legend"><div class="legend-dot"></div> Avg Ping</div>
      </div>
    </div>
    <canvas id="chart" height="160"></canvas>
  </div>

  <!-- Recent checks -->
  <div class="checks-section">
    <div class="section-head">
      <h3>Recent Checks</h3>
      <div class="checks-tools">
        <label>Range</label>
        <select id="checks-range" onchange="onChecksFilterChange()">
          <option value="1h">Last 1 hour</option>
          <option value="2h" selected>Last 2 hours</option>
          <option value="6h">Last 6 hours</option>
          <option value="12h">Last 12 hours</option>
          <option value="1d">Last 1 day</option>
          <option value="2d">Last 2 days</option>
          <option value="3d">Last 3 days</option>
          <option value="4d">Last 4 days</option>
          <option value="5d">Last 5 days</option>
          <option value="6d">Last 6 days</option>
          <option value="7d">Last 7 days</option>
        </select>
        <label>Rows</label>
        <select id="checks-page-size" onchange="onChecksFilterChange()">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
        <div class="pager">
          <button id="checks-prev" onclick="prevChecksPage()">◀ Prev</button>
          <span id="checks-page-info">Page 1 / 1</span>
          <button id="checks-next" onclick="nextChecksPage()">Next ▶</button>
        </div>
      </div>
    </div>
    <table>
      <thead><tr>
        <th>Status</th><th>Time</th><th>Response</th><th>Status Code</th>
      </tr></thead>
      <tbody id="checks-table"></tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Monitor</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-col">
        <div class="section-title">General</div>
        <div class="form-group">
          <label class="form-label">Monitor Type</label>
          <select class="form-control"><option>HTTP(s)</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">Friendly Name</label>
          <input class="form-control" id="f-name" placeholder="My Website">
        </div>
        <div class="form-group">
          <label class="form-label">URL</label>
          <input class="form-control" id="f-url" placeholder="https://">
        </div>
        <div class="form-group">
          <label class="form-label">Heartbeat Interval (seconds)</label>
          <input class="form-control" id="f-interval" type="number" value="60" min="10">
        </div>
        <div class="form-group">
          <label class="form-label">Retries</label>
          <input class="form-control" id="f-retries" type="number" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Request Timeout (seconds)</label>
          <input class="form-control" id="f-timeout" type="number" value="30" min="5">
        </div>
      </div>
      <div class="modal-col">
        <div class="section-title">HTTP Options</div>
        <div class="form-group">
          <label class="form-label">Method</label>
          <select class="form-control" id="f-method">
            <option>GET</option><option>POST</option><option>HEAD</option><option>PUT</option>
          </select>
        </div>
        <div class="form-group">
          <div class="section-title" style="margin-top:.25rem">Notifications</div>
          <span class="form-hint">Choose channels for this monitor. <a href="/settings" target="_blank">Create channels in Settings</a></span>
          <div class="notify-pick" id="f-notify-channels"></div>
        </div>
      </div>
    </div>
    <div class="error-msg" id="modal-error"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Update</button>
    </div>
  </div>
</div>

<script>
const sid = parseInt(location.pathname.split("/").pop());
let svcData = null;
let checksPage = 1;
let checksTotalPages = 1;
let notifyChannels = [];
let liveTimer = null;
let checksTimer = null;
let chartTimer = null;
let chartHistory = [];
let chartRange = "1d";

async function loadNotifyChannelOptions() {
  const res = await fetch("/api/settings/notifications/options");
  if (res.status === 401) { location.href = "/login"; return; }
  notifyChannels = res.ok ? await res.json() : [];
}

function renderNotifyPicker(selectedIds = []) {
  const el = document.getElementById("f-notify-channels");
  const enabled = notifyChannels.filter(c => c.enabled);
  if (!enabled.length) {
    el.innerHTML = `<div class="empty-hint">No channels yet. <a href="/settings" target="_blank">Open Settings → Notifications</a> to create Slack or email channels.</div>`;
    return;
  }
  const sel = new Set((selectedIds || []).map(Number));
  el.innerHTML = enabled.map(c => `
    <label><input type="checkbox" value="${c.id}" ${sel.has(c.id) ? "checked" : ""}>
      ${c.name} <span style="color:var(--muted)">(${c.type})</span></label>
  `).join("");
}

function getSelectedNotifyChannels() {
  return [...document.querySelectorAll("#f-notify-channels input:checked")].map(el => parseInt(el.value, 10));
}

// ── Sidebar ─────────────────────────────────────────────
async function loadSidebar() {
  const svcsRes = await fetch("/api/services");
  if (svcsRes.status === 401) { location.href = "/login"; return; }
  const svcs = await svcsRes.json();
  document.getElementById("sidebar-list").innerHTML = svcs.map(s=>{
    const dc = s.current_up===null?"":s.current_up?"up":"down";
    const ms = s.current_ms?Math.round(s.current_ms)+"ms":"–";
    return `<div class="svc-item ${s.id===sid?'active':''}" onclick="location.href='/service/${s.id}'">
      <div class="dot ${dc}"></div>
      <div class="svc-info">
        <div class="svc-name">${s.name}</div>
        <div class="svc-ms">${ms} · every ${s.interval}s</div>
      </div>
    </div>`;
  }).join("");
  const statsRes = await fetch("/api/db-stats");
  if (statsRes.status === 401) { location.href = "/login"; return; }
  const stats = await statsRes.json();
  document.getElementById("db-info").textContent = `${stats.checks.toLocaleString()} checks`;
}

// ── Helpers ─────────────────────────────────────────────
function cls(v,g,w){if(v===null||v===undefined)return"";return v>=g?"good":v>=w?"warn":"bad"}
function dCls(d){if(d===null||d===undefined)return"";return d>60?"good":d>14?"warn":"bad"}
function fmt(v,s=""){return v===null||v===undefined?"–":v+s}
function timeAgo(ts){
  const d=Math.floor((Date.now()/1000)-ts);
  if(d<60)return d+"s ago";if(d<3600)return Math.floor(d/60)+"m ago";
  return Math.floor(d/3600)+"h ago";
}

// ── Render ──────────────────────────────────────────────
function renderHeader(s) {
  document.title = s.name + " — Tech Monitoring";
  document.getElementById("svc-name").textContent = s.name;
  const urlEl = document.getElementById("svc-url");
  urlEl.textContent = s.url; urlEl.href = s.url;
  document.getElementById("svc-id").textContent = "#" + s.id;

  const pb = document.getElementById("btn-pause");
  if (s.paused) { pb.textContent = "▶ Resume"; pb.className = "btn edit"; }
  else          { pb.textContent = "⏸ Pause";  pb.className = "btn pause"; }

  document.getElementById("check-info").textContent = `Check every ${s.interval} seconds (${s.interval} seconds)`;
}

function renderLive(s) {
  const badge = document.getElementById("up-badge");
  const bc = s.current_up===null?"unknown":s.current_up?"up":"down";
  badge.className = "up-badge " + bc;
  badge.textContent = s.current_up===null?"?":s.current_up?"Up":"Down";

  const hb = s.heartbeat || [];
  document.getElementById("hb-row").innerHTML = hb.map(h=>
    `<div class="hb-bar ${h.ok?'up':'down'}" title="${new Date(h.ts*1000).toLocaleTimeString()} — ${h.ok?'Up':'Down'}"></div>`
  ).join("") || '<span style="color:var(--muted);font-size:0.7rem">Waiting for first check…</span>';
  if (hb.length) {
    document.getElementById("hb-start").textContent = timeAgo(hb[0].ts);
  }

  const curMs = s.current_ms ? Math.round(s.current_ms)+"ms" : "–";
  const avgMs = s.avg_ms_24h ? s.avg_ms_24h.toFixed(2)+"ms"  : "–";
  const sslD  = s.ssl_days!==null ? s.ssl_days+" days" : "–";
  const domD  = s.domain_days!==null ? s.domain_days+" days" : "–";
  document.getElementById("stats-row").innerHTML = [
    sc("Response","(Current)",curMs,s.current_ms>800?"warn":s.current_ms?"good":"","link",""),
    sc("Avg. Response","(24 hours)",curMs,"",""   ,avgMs),
    sc("Uptime","(24 hours)",fmt(s.uptime_24h,"%"),cls(s.uptime_24h,99.9,95),"",""),
    sc("Uptime","(30 days)", fmt(s.uptime_30d,"%"),cls(s.uptime_30d,99.9,95),"",""),
    sc("Uptime","(1 year)",  fmt(s.uptime_1y,"%"), cls(s.uptime_1y, 99.9,95),"",""),
    sc("Cert Exp.",s.ssl_expiry||"–",sslD,dCls(s.ssl_days),"link",""),
    sc("Domain Exp.",s.domain_expiry||"–",domD,dCls(s.domain_days),"",""),
  ].join("");
}

async function loadChart() {
  chartRange = document.getElementById("chart-range").value;
  const res = await fetch(`/api/services/${sid}/history?range=${encodeURIComponent(chartRange)}`);
  if (res.status === 401) { location.href = "/login"; return; }
  if (!res.ok) return;
  const data = await res.json();
  chartHistory = data.items || [];
  drawChart(chartHistory, chartRange);
}

function onChartRangeChange() {
  loadChart();
  scheduleChartRefresh();
}

function render(s) {
  svcData = s;
  renderHeader(s);
  renderLive(s);
  scheduleLiveRefresh();
}

function sc(label,sub,val,cls,extra,sub2) {
  return `<div class="stat-cell">
    <div class="stat-label">${label}</div>
    <div class="stat-sub">${sub}</div>
    <div class="stat-val ${cls} ${extra}">${val}</div>
    ${sub2?`<div class="stat-val2">${sub2}</div>`:""}
  </div>`;
}

function renderChecksTable(items) {
  document.getElementById("checks-table").innerHTML = (items || []).map(h=>`
    <tr>
      <td><span class="badge ${h.ok?'up':'down'}">${h.ok?'Up':'Down'}</span></td>
      <td>${new Date(h.ts*1000).toLocaleString()}</td>
      <td>${Math.round(h.ms)}ms</td>
      <td>${h.code||'–'}</td>
    </tr>`).join("") || '<tr><td colspan="4" style="color:var(--muted);padding:1rem">No checks found for this range</td></tr>';
}

async function loadChecks() {
  const range = document.getElementById("checks-range").value;
  const pageSize = parseInt(document.getElementById("checks-page-size").value, 10) || 50;
  const res = await fetch(`/api/services/${sid}/checks?range=${encodeURIComponent(range)}&page=${checksPage}&page_size=${pageSize}`);
  if (res.status === 401) { location.href = "/login"; return; }
  if (!res.ok) return;
  const data = await res.json();
  checksTotalPages = data.total_pages || 1;
  checksPage = Math.min(Math.max(data.page || 1, 1), checksTotalPages);
  renderChecksTable(data.items || []);
  document.getElementById("checks-page-info").textContent = `Page ${checksPage} / ${checksTotalPages} (${(data.total || 0).toLocaleString()} checks)`;
  document.getElementById("checks-prev").disabled = checksPage <= 1;
  document.getElementById("checks-next").disabled = checksPage >= checksTotalPages;
}

function onChecksFilterChange() {
  checksPage = 1;
  loadChecks();
}

function prevChecksPage() {
  if (checksPage <= 1) return;
  checksPage -= 1;
  loadChecks();
}

function nextChecksPage() {
  if (checksPage >= checksTotalPages) return;
  checksPage += 1;
  loadChecks();
}

// ── Chart ────────────────────────────────────────────────
function formatChartLabel(ts, range) {
  const d = new Date(ts * 1000);
  if (range === "5m") {
    return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});
  }
  if (range === "15d" || range === "7d") {
    return d.toLocaleDateString([], {month:"short", day:"numeric"});
  }
  if (range === "2d") {
    return d.toLocaleString([], {month:"short", day:"numeric", hour:"2-digit", minute:"2-digit"});
  }
  return d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
}

function drawChart(history, range=chartRange) {
  const canvas = document.getElementById("chart");
  const ctx    = canvas.getContext("2d");
  const dpr    = window.devicePixelRatio || 1;
  const W      = canvas.parentElement.clientWidth;
  const H      = 160;
  canvas.width = W*dpr; canvas.height = H*dpr;
  canvas.style.width = W+"px"; canvas.style.height = H+"px";
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (!history.length) {
    ctx.fillStyle = "#fff";
    ctx.font = "12px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("No response data for this range", W / 2, H / 2);
    canvas._history = [];
    return;
  }
  const vals = history.map(h=>h.ms);
  const mn   = Math.min(...vals);
  const mx   = Math.max(...vals, mn+1);
  const pad  = { t:20, b:30, l:50, r:20 };
  const cW   = W - pad.l - pad.r;
  const cH   = H - pad.t - pad.b;
  const n    = vals.length;

  // Y grid lines & labels
  const steps = 5;
  for (let i=0; i<=steps; i++) {
    const v = mn + (mx-mn) * (i/steps);
    const y = pad.t + cH - (i/steps)*cH;
    ctx.strokeStyle = "#3a3a52"; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.font = "10px monospace"; ctx.textAlign = "right";
    ctx.fillText(Math.round(v), pad.l-6, y+4);
  }

  // X time labels
  ctx.fillStyle = "#fff"; ctx.font = "9px monospace"; ctx.textAlign = "center";
  [0, 0.25, 0.5, 0.75, 1].forEach(f => {
    const i   = Math.min(Math.round(f*(n-1)), n-1);
    const x   = pad.l + f*cW;
    const lbl = formatChartLabel(history[i].ts, range);
    ctx.fillText(lbl, x, H-pad.b+14);
  });

  const px = i => n<=1 ? pad.l + cW/2 : pad.l + (i/(n-1))*cW;
  const py = v => pad.t + cH - ((v-mn)/(mx-mn))*cH;

  // Area fill
  ctx.beginPath();
  vals.forEach((v,i) => i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)));
  ctx.lineTo(px(n-1), pad.t+cH); ctx.lineTo(px(0), pad.t+cH); ctx.closePath();
  const g = ctx.createLinearGradient(0, pad.t, 0, pad.t+cH);
  g.addColorStop(0, "#22c55e44"); g.addColorStop(1, "#22c55e00");
  ctx.fillStyle = g; ctx.fill();

  // Line
  ctx.beginPath();
  vals.forEach((v,i) => i===0 ? ctx.moveTo(px(i),py(v)) : ctx.lineTo(px(i),py(v)));
  ctx.strokeStyle = "#22c55e"; ctx.lineWidth = 1.5; ctx.stroke();

  // Down markers
  history.forEach((h,i) => {
    if (!h.ok) {
      ctx.fillStyle = "#ef444466";
      ctx.fillRect(px(i)-1, pad.t, 2, cH);
    }
  });

  // Hover tooltip
  canvas._history = history;
  canvas._pad = pad; canvas._cW = cW; canvas._cH = cH;
  canvas._mn = mn; canvas._mx = mx;
}

// Chart tooltip on hover
document.getElementById("chart").addEventListener("mousemove", e => {
  const canvas = e.target;
  if (!canvas._history) return;
  const {_history:h,_pad:pad,_cW:cW,_mn:mn,_mx:mx} = canvas;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - pad.l;
  const idx = Math.round(x / cW * (h.length-1));
  if (idx<0||idx>=h.length) return;
  const p = h[idx];
  canvas.title = `${new Date(p.ts*1000).toLocaleTimeString()} — ${Math.round(p.ms)}ms`;
});

// ── Actions ─────────────────────────────────────────────
async function logout() {
  await fetch("/api/auth/logout", {method:"POST"});
  location.href = "/login";
}

async function togglePause() {
  const paused = !svcData.paused;
  await fetch(`/api/services/${sid}/pause`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({paused})
  });
  await loadData();
}

async function deleteMonitor() {
  if (!confirm(`Delete "${svcData?.name}"? This cannot be undone.`)) return;
  await fetch(`/api/services/${sid}`, {method:"DELETE"});
  location.href = "/";
}

// ── Edit modal ───────────────────────────────────────────
function openEditModal() {
  if (!svcData) return;
  document.getElementById("f-name").value     = svcData.name;
  document.getElementById("f-url").value      = svcData.url;
  document.getElementById("f-interval").value = svcData.interval;
  document.getElementById("f-retries").value  = svcData.retries;
  document.getElementById("f-timeout").value  = svcData.timeout;
  document.getElementById("f-method").value   = svcData.method;
  document.getElementById("modal-error").style.display = "none";
  loadNotifyChannelOptions().then(() => renderNotifyPicker(svcData.notification_channels || []));
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }
document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});

async function saveEdit() {
  const body = {
    name:     document.getElementById("f-name").value.trim(),
    url:      document.getElementById("f-url").value.trim(),
    interval: parseInt(document.getElementById("f-interval").value),
    retries:  parseInt(document.getElementById("f-retries").value),
    timeout:  parseInt(document.getElementById("f-timeout").value),
    method:   document.getElementById("f-method").value,
    notification_channels: getSelectedNotifyChannels(),
  };
  const res  = await fetch(`/api/services/${sid}`, {
    method:"PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if (!res.ok) { document.getElementById("modal-error").style.display="block"; return; }
  closeModal();
  await loadData();
}

// ── Live refresh (heartbeat + chart) ─────────────────────
function livePollMs() {
  const interval = svcData?.interval || 10;
  return Math.max(3000, interval * 1000);
}

function chartPollMs() {
  return chartRange === "5m" ? 3000 : null;
}

function scheduleLiveRefresh() {
  if (liveTimer) clearInterval(liveTimer);
  liveTimer = setInterval(refreshLive, livePollMs());
}

function scheduleChartRefresh() {
  if (chartTimer) clearInterval(chartTimer);
  chartTimer = null;
  const ms = chartPollMs();
  if (ms) chartTimer = setInterval(loadChart, ms);
}

function scheduleChecksRefresh() {
  if (checksTimer) clearInterval(checksTimer);
  checksTimer = setInterval(() => {
    if (checksPage === 1) loadChecks();
  }, livePollMs());
}

async function refreshLive() {
  if (document.getElementById("modal").classList.contains("open")) return;
  const res = await fetch(`/api/services/${sid}`);
  if (res.status === 401) { location.href = "/login"; return; }
  if (!res.ok) return;
  const s = await res.json();
  const prevInterval = svcData?.interval;
  svcData = s;
  renderLive(s);
  if (s.interval !== prevInterval) {
    scheduleLiveRefresh();
    scheduleChartRefresh();
  }
  if (chartRange !== "5m") loadChart();
}

// ── Main load ────────────────────────────────────────────
async function loadData() {
  const res = await fetch(`/api/services/${sid}`);
  if (res.status === 401) { location.href = "/login"; return; }
  const s = await res.json();
  render(s);
  await Promise.all([loadChart(), loadChecks()]);
  scheduleChecksRefresh();
  scheduleChartRefresh();
}

loadSidebar();
loadData();
setInterval(loadSidebar, 60000);
window.addEventListener("resize", () => {
  if (chartHistory.length) drawChart(chartHistory, chartRange);
});
</script>
